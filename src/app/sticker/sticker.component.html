<div class="container">

  <div class="display-4 text-center">Cadastro de Figurinhas</div>

  <form [formGroup]="formGroupSticker">

   <div class="mb-3">
      <label for="inputName" class="form-label">Nome</label>
      <input formControlName="name" type="text" class="form-control" id="inputName">
    </div>

    <div class="mb-3">
      <label for="inputTeam" class="form-label">Time</label>
      <input formControlName="team" type="text" class="form-control" id="inputTeam">
    </div>

    <div class="mb-3">
      <label for="inputType" class="form-label">Tipo</label>
      <input formControlName="type" type="text" class="form-control" id="inputType">
    </div>

    <div class="mb-3">
      <label for="inputNumber" class="form-label">Numero</label>
      <input formControlName="number" type="text" class="form-control" id="inputNumber">
    </div>

    <div class="mb-3">
      <label for="inputDoubles" class="form-label">Repetidas</label>
      <input formControlName="doubles" type="text" class="form-control" id="inputDoubles">
    </div>

    <button *ngIf="!isEditing"   type="submit" class="btn btn-primary" (click)="save()">Salvar</button>
    <button *ngIf="isEditing"   type="submit" class="btn btn-primary"  (click)="update()">Atualizar</button>
</form>
</div>

<div class="container2">
  <table class="table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Nome</th>
        <th scope="col">Time</th>
        <th scope="col">Tipo</th>
        <th scope="col">Numero</th>
        <th scope="col">Repetidas</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of stickers()">
        <th scope="row">{{ s.id }}</th>
        <td>{{s.name}}</td>
        <td>{{s.team}}</td>
        <td>{{s.type}}</td>
        <td>{{s.number}}</td>
        <td>{{s.doubles}}</td>
        <td>
          <button class="btn btn-danger" (click)="delete(s)"   >
            Remover
          </button>
        </td>
        <td>
          <button class="btn btn-secondary" (click)="onClickUpdate(s)" >
            Alterar
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
