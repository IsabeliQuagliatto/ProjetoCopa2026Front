<div class="display-4 text-center my-4">Album</div>

<table class="table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Nome</th>
        <th scope="col">Time</th>
        <th scope="col">Tipo</th>
        <th scope="col">Numero</th>
        <th scope="col">Repetidas</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of stickers()">
        <th scope="row">{{ s.id }}</th>
        <td>{{s.name}}</td>
        <td>{{s.team}}</td>
        <td>{{s.type}}</td>
        <td>{{s.number}}</td>
        <td>{{s.doubles}}</td>
      </tr>
    </tbody>
  </table>
